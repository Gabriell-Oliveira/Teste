    <meta property="og:type"        content="website" />

    <meta property="og:title"       content="🧵 Ateliê Mary Consertos" />
    <meta property="og:description" content="Acompanhe o status do seu conserto em tempo real." />
    <!--

      Enquanto não tiver imagem própria, use o placeholder abaixo.

    <meta property="og:image"       content="https://costura-app-flame.vercel.app/" />

    <meta property="og:image:height" content="630" />
